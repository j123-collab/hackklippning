<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#2d5016" stroke="#2d5016" stroke-width="2"/>

  <!-- Fence illustration — stör (posts) leaning slightly -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Posts (stör) — slightly angled, varying heights -->
    <line x1="52" y1="30" x2="48" y2="95"/>
    <line x1="72" y1="24" x2="68" y2="95"/>
    <line x1="92" y1="22" x2="88" y2="95"/>
    <line x1="112" y1="22" x2="108" y2="95"/>
    <line x1="132" y1="24" x2="128" y2="95"/>
    <line x1="152" y1="30" x2="148" y2="95"/>

    <!-- Rails (slana) — horizontal, slight curve -->
    <path d="M44 50 Q100 42 156 50" stroke-width="2"/>
    <path d="M44 65 Q100 57 156 65" stroke-width="2"/>
    <path d="M44 80 Q100 72 156 80" stroke-width="2"/>
  </g>

  <!-- Ground/hill line -->
  <path d="M30 100 Q100 88 170 100" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- L.FALK text -->
  <text x="100" y="128" text-anchor="middle" font-family="Georgia, 'DM Serif Display', serif" font-size="30" font-weight="bold" fill="#fff" letter-spacing="3">L.FALK</text>

  <!-- TRÄDGÅRD & GÄRDSGÅRD curved text along bottom of circle -->
  <defs>
    <path id="bottomArc" d="M 36 155 A 82 82 0 0 1 164 155"/>
  </defs>
  <text fill="rgba(255,255,255,0.75)" font-family="Inter, 'Helvetica Neue', sans-serif" font-size="11.5" font-weight="600" letter-spacing="3.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">TRÄDGÅRD &amp; GÄRDSGÅRD</textPath>
  </text>
</svg>
