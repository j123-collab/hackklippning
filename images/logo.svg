<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#2d5016" stroke="#2d5016" stroke-width="2"/>

  <!-- Fence illustration — stör (posts) leaning slightly -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Posts (stör) — slightly angled, varying heights -->
    <line x1="52" y1="55" x2="48" y2="135"/>
    <line x1="72" y1="48" x2="68" y2="135"/>
    <line x1="92" y1="45" x2="88" y2="135"/>
    <line x1="112" y1="45" x2="108" y2="135"/>
    <line x1="132" y1="48" x2="128" y2="135"/>
    <line x1="152" y1="55" x2="148" y2="135"/>

    <!-- Rails (slana) — horizontal, slight curve -->
    <path d="M44 78 Q100 70 156 78" stroke-width="2"/>
    <path d="M44 98 Q100 90 156 98" stroke-width="2"/>
    <path d="M44 118 Q100 110 156 118" stroke-width="2"/>
  </g>

  <!-- Ground/hill line -->
  <path d="M30 142 Q100 130 170 142" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>
